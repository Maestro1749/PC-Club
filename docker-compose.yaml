services:
  db:
    image: postgres:15
    container_name: pcclub_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pcclub
      - TZ=Europe/Moscow
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  
  migrate:
    image: migrate/migrate
    depends_on:
      - db
    volumes:
      - ./migrations:/migrations
    entrypoint: [
      "migrate",
      "-path", "/migrations",
      "-database", "postgres://postgres:postgres@db:5432/pcclub?sslmode=disable",
      "up"
    ]

  app:
    build: .
    container_name: pcclub_app
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=pcclub
      - TZ=Europe/Moscow
    ports:
      - "8080:8080"

volumes:
  db_data: